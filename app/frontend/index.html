<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School District Evaluator</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand" data-link>
            <span class="brand-mark">District Lens</span>
            <span class="brand-copy">NCES-backed district explorer</span>
        </a>
        <nav class="topnav">
            <a href="/" data-link>Explore</a>
            <a href="/compare" data-link>Saved Compare</a>
        </nav>
        <div class="topbar-actions">
            <button id="refreshDataButton" type="button" class="secondary small">Refresh NCES Cache</button>
            <span id="dataBadge" class="data-badge"></span>
        </div>
    </header>

    <main id="app"></main>
    <div id="globalStatus" class="global-status" aria-live="polite"></div>

    <script src="/main.js"></script>
</body>
</html>
